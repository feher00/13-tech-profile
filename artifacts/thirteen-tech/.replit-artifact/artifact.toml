kind = "web"
previewPath = "/"
title = "13 Tech LLC"
version = "1.0.0"
id = "artifacts/thirteen-tech"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24691

[services.development]
run = "pnpm --filter @workspace/thirteen-tech run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thirteen-tech", "run", "build" ]
serve = "static"
publicDir = "artifacts/thirteen-tech/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24691"
BASE_PATH = "/"
